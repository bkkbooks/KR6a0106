body:
  text: 東晉西域沙門竺曇無蘭譯聞如是一時婆伽婆在阿迎闍波斯匿王所造觀也恆水側與大比丘衆五百人俱時有大聚沫為水所漂世尊見已告諸比丘汝等頗見此沫聚為恆水所漂不諸比丘對曰如是世尊世尊告曰此沫聚若有目士諦觀察之思惟分別彼人見已諦觀察之思惟分別空無所有無來無往亦不堅固此水聚沫何可依怙如是諸所有色過去當來現在若麁若細若遠若近彼有目士諦觀察之思惟分別彼人見已諦觀察之思惟分別空無所有無來無往空無所有亦不堅固此色陰有何堅固譬如夏雨有泡現或有生者或有滅者彼有目士諦觀察之思惟分別彼人已見諦觀察之思惟分別空無所有無來無往亦不堅固猶如此水沫有何堅固如是此身中痛當來過去現在若麁若細若好若醜若遠若近彼有目士諦觀察之思惟分別彼已觀察思惟分別覺知空無所有無來無往亦不堅固此痛陰中有何堅固譬若夏後日日正中無有雲曀野馬熾盛彼有目士而觀察之思惟分別彼已觀察思惟分別則覺知空無所有無來無往亦不堅固此野馬有何堅固如是諸所有想過去當來現在若麁若細若好若醜若遠若近彼有目士而觀察之思惟分別彼已觀察思惟分別空無所有無來無往亦無堅固此想陰中有何堅固譬如有人從城郭村落出求堅固彼器便往大叢樹中若見芭蕉樹生茂盛好人見者歡喜獨生無枝葉若斷其根作三四段在處皮處皮剝却欲求實不可得況欲得堅固彼有目士諦觀察思惟分別彼已觀察思惟分別空無所有無來無往亦不堅固此芭蕉樹有何堅固如是諸所有行過去當來現在若麁若細若好若醜若遠若近彼有目士而觀察之思惟分別彼已觀察思惟分別覺知空無所有無來無往亦不堅固此行陰有何堅固譬如黠慧幻師及幻師弟子在衆人前自現幻術若有目士諦觀察思惟分別彼已觀察思惟分別空無所有無來無往亦不堅固此幻術有何堅固如是諸所有識過去當來現在若麁若細若好若醜若遠若近彼有目士而諦觀察思惟分別彼已觀察思惟分別空無所有無來無往亦不堅固此識陰有何堅固爾時世尊便說偈言色如彼聚沫痛如彼水泡想如夏野馬行如芭蕉樹識如彼幻術最勝之所說若能諦觀察思惟而分別空亦無所有若能作是觀諦察此身中大智之所說當滅此三法能捨除去色此行亦如是幻師不真術爾時諸比丘聞佛所說歡喜奉行
